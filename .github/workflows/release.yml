name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Go executable
        run: |
          $tag = "${{ github.ref }}" -replace 'refs/tags/v', ''
          go build -ldflags="-s -w -H windowsgui -X smtc-now-playing/internal/version.Version=$tag" -o SmtcNowPlaying.exe ./cmd/smtc-now-playing

      - name: Extract version from tag
        id: version
        run: |
          $tag = "${{ github.ref }}" -replace 'refs/tags/v', ''
          echo "version=$tag" >> $env:GITHUB_OUTPUT

      - name: Extract changelog for version
        id: changelog
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $changelogPath = "CHANGELOG.md"
          $content = Get-Content $changelogPath -Raw

          # Extract section for this version using Singleline flag for dotall mode
          $pattern = "## \[$version\].*?(?=## \[|$)"
          $match = [System.Text.RegularExpressions.Regex]::Match($content, $pattern, [System.Text.RegularExpressions.RegexOptions]::Singleline)

          if ($match.Success) {
            $section = $match.Value.Trim()
            # Remove the version header line to get just the content
            $section = $section -replace "## \[$version\].*?\n", ""
            $section = $section.Trim()
          } else {
            $section = "See CHANGELOG.md for details"
          }

          # Emit as a multi-line output using the heredoc-style delimiter syntax.
          # The %0A escape only worked with the deprecated ::set-output:: command;
          # with $GITHUB_OUTPUT it would be rendered as a literal in the release body.
          $delimiter = "EOF_$(New-Guid)"
          "body<<$delimiter" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $section          | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $delimiter        | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create release archive
        run: |
          mkdir release_content
          copy README.md release_content\
          copy LICENSE release_content\
          copy CHANGELOG.md release_content\
          copy SmtcNowPlaying.exe release_content\
          xcopy themes release_content\themes /E /I /Y
          xcopy script release_content\script /E /I /Y
          
          cd release_content
          Compress-Archive -Path * -DestinationPath ..\SmtcNowPlaying-${{ steps.version.outputs.version }}.zip
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: SmtcNowPlaying-${{ steps.version.outputs.version }}.zip
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
